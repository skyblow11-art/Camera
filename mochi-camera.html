<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>むぃ散歩カメラ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
    touch-action: none;
    user-select: none;
  }

  #camera-container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* もちちゃん */
  #mochi-wrap {
    position: absolute;
    bottom: -10px;
    left: -10px;
    width: 210px;
    height: 210px;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.15s ease;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
  }

  #mochi-wrap:active {
    transform: scale(0.9);
  }

  #mochi-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-6px); }
  }

  /* つついたときのリアクション */
  #mochi-wrap.poked #mochi-img {
    animation: poke 0.4s ease forwards;
  }
  @keyframes poke {
    0%   { transform: scale(1) rotate(0deg); }
    30%  { transform: scale(1.2) rotate(-8deg); }
    60%  { transform: scale(0.95) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* セリフバブル */
  #bubble {
    position: absolute;
    bottom: 300px;
    left: 10px;
    background: rgba(255,255,255,0.93);
    color: #5c3d20;
    font-size: 14px;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 11;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #bubble.show {
    opacity: 1;
    transform: translateY(0);
  }
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 22px;
    border-width: 8px 6px 0;
    border-style: solid;
    border-color: rgba(255,255,255,0.93) transparent transparent;
  }

  /* シャッターボタンエリア */
  #controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.45));
    z-index: 10;
  }

  #shutter {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    border: 4px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.25), 0 4px 16px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  #shutter:active {
    transform: scale(0.88);
    background: rgba(220,220,220,0.95);
  }

  /* カメラ切替ボタン */
  #flip-btn {
    position: absolute;
    bottom: 30px;
    right: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: none;
    color: white;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
    z-index: 10;
    transition: background 0.15s;
  }
  #flip-btn:active { background: rgba(255,255,255,0.4); }

  /* フラッシュ演出 */
  #flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  #flash.go {
    animation: flash-anim 0.35s ease-out forwards;
  }
  @keyframes flash-anim {
    0%   { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* トースト */
  #toast {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(30,30,30,0.82);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    white-space: nowrap;
    z-index: 30;
    backdrop-filter: blur(6px);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* カメラ許可待ち画面 */
  #permission-screen {
    position: absolute;
    inset: 0;
    background: #f5ede3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 50;
  }
  #permission-screen p {
    color: #5c3d20;
    font-size: 15px;
    text-align: center;
    line-height: 1.6;
  }
  #permission-screen button {
    background: #c77b4a;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }

  /* 夢川フィルターオーバーレイ */
  #filter-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(255,200,220,0.0) 40%, rgba(200,170,255,0.35) 100%);
    mix-blend-mode: screen;
    transition: opacity 0.4s;
  }

  /* 夢川度スライダーUI */
  #dream-slider-wrap {
    position: absolute;
    bottom: 110px;
    right: 16px;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  #dream-label {
    color: white;
    font-size: 10px;
    font-weight: bold;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    white-space: nowrap;
  }
  #dream-val {
    color: white;
    font-size: 12px;
    font-weight: bold;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  #dream-slider {
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 32px;
    height: 110px;
    cursor: pointer;
    accent-color: #f0a0c8;
  }

  /* サムネイルプレビュー */
  #thumb {
    position: absolute;
    bottom: 24px;
    left: 28px;
    width: 52px;
    height: 52px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 10;
    cursor: pointer;
    display: none;
  }
  #thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>

  <!-- もちちゃん -->
  <div id="mochi-wrap">
    <img id="mochi-img" src="" alt="もちちゃん">
  </div>
  <div id="bubble">むぃ</div>

  <!-- コントロール -->
  <div id="controls">
    <button id="shutter" aria-label="撮影"></button>
  </div>
  <button id="flip-btn" aria-label="カメラ切替">🔄</button>

  <!-- サムネイル -->
  <div id="thumb"><img id="thumb-img" src="" alt="撮影画像"></div>

  <!-- フィルターオーバーレイ -->
  <div id="filter-overlay"></div>

  <!-- 夢川度スライダー -->
  <div id="dream-slider-wrap">
    <div id="dream-label">🌸夢川度</div>
    <input id="dream-slider" type="range" min="0" max="100" value="0">
    <div id="dream-val">0%</div>
  </div>

  <!-- エフェクト -->
  <div id="flash"></div>
  <div id="toast">📸 保存しました</div>

  <!-- 許可画面 -->
  <div id="permission-screen" id="permission-screen">
    <p>むぃ散歩カメラを<br>起動するよ🎵<br><br>カメラのアクセスを<br>許可してね</p>
    <button id="start-btn">はじめる</button>
  </div>
</div>

<!-- キャンバス（合成用・非表示） -->
<canvas id="canvas" style="display:none"></canvas>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const shutter = document.getElementById('shutter');
const flipBtn = document.getElementById('flip-btn');
const flash = document.getElementById('flash');
const toast = document.getElementById('toast');
const bubble = document.getElementById('bubble');
const mochiWrap = document.getElementById('mochi-wrap');
const permScreen = document.getElementById('permission-screen');
const startBtn = document.getElementById('start-btn');
const thumb = document.getElementById('thumb');
const thumbImg = document.getElementById('thumb-img');

let currentFacing = 'environment';
let stream = null;
let toastTimer = null;

const muiWords = ['むぃ','むぃむぃ','むぃ？','むぃ！','むぃ〜','むぃ…'];

// カメラ起動
async function startCamera(facing = 'environment') {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    currentFacing = facing;
  } catch (e) {
    console.error(e);
    showToast('📷 カメラを起動できなかったよ…');
  }
}

// 許可ボタン
startBtn.addEventListener('click', async () => {
  permScreen.style.display = 'none';
  await startCamera();
});

// 撮影
shutter.addEventListener('click', () => {
  const w = video.videoWidth || 1280;
  const h = video.videoHeight || 720;
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  // フィルター適用して描画
  const fv = parseInt(dreamSlider.value);
  const fhue = fv * 0.15;
  const fsat = 1 + fv * 0.008;
  const fbright = 1 + fv * 0.003;
  const fblur = fv * 0.04;
  ctx.filter = [
    `hue-rotate(${fhue}deg)`,
    `saturate(${fsat})`,
    `brightness(${fbright})`,
    `blur(${fblur}px)`
  ].join(' ');
  ctx.drawImage(video, 0, 0, w, h);
  ctx.filter = 'none';

  // もちちゃんを左下に合成
  const mochiSize = Math.round(w * 0.18);
  const mx = Math.round(w * 0.03);
  const my = h - mochiSize - Math.round(h * 0.02);
  ctx.drawImage(mochiImg, mx, my, mochiSize, mochiSize);

  // フラッシュ
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');

  // 保存
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mui_sanpo_${Date.now()}.jpg`;
    a.click();
    URL.revokeObjectURL(url);

    // サムネイル
    thumbImg.src = canvas.toDataURL('image/jpeg', 0.7);
    thumb.style.display = 'block';
  }, 'image/jpeg', 0.92);

  showToast('📸 むぃ！');
});

// カメラ切替
flipBtn.addEventListener('click', () => {
  const next = currentFacing === 'environment' ? 'user' : 'environment';
  startCamera(next);
});

// もちちゃんをつつく
mochiWrap.addEventListener('click', () => {
  const word = muiWords[Math.floor(Math.random() * muiWords.length)];
  bubble.textContent = word;
  bubble.classList.add('show');
  mochiWrap.classList.remove('poked');
  void mochiWrap.offsetWidth;
  mochiWrap.classList.add('poked');
  setTimeout(() => {
    bubble.classList.remove('show');
    mochiWrap.classList.remove('poked');
  }, 1400);
});

// サムネイルクリックで拡大（簡易）
thumb.addEventListener('click', () => {
  const w = window.open('');
  w.document.write(`<img src="${thumbImg.src}" style="max-width:100%;max-height:100vh;">`);
});


// 夢川度スライダー
const dreamSlider = document.getElementById('dream-slider');
const dreamVal = document.getElementById('dream-val');
const filterOverlay = document.getElementById('filter-overlay');

dreamSlider.addEventListener('input', () => {
  const v = parseInt(dreamSlider.value); // 0〜100
  dreamVal.textContent = v + '%';

  // --- video に CSS filter を適用 ---
  // 色味：ピンク寄り (hue-rotate)
  const hue = v * 0.15;           // 0〜15deg
  const sat = 1 + v * 0.008;      // 1.0〜1.8
  const bright = 1 + v * 0.003;   // 1.0〜1.3
  const blur = v * 0.04;          // 0〜4px
  video.style.filter = [
    `hue-rotate(${hue}deg)`,
    `saturate(${sat})`,
    `brightness(${bright})`,
    `blur(${blur}px)`
  ].join(' ');

  // オーバーレイ（ビネット＋発光）の不透明度
  filterOverlay.style.opacity = (v / 100) * 0.7;
});

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}
</script>
