<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fce4f5">
<title>むぃ王国</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#ffc2d4;--lav:#d4b8e0;--mint:#b8e0d4;
  --glass:rgba(255,235,248,0.55);--gb:rgba(255,255,255,0.65);
  --sh:rgba(200,150,200,0.22);
}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:'Zen Maru Gothic',sans-serif;background:#f0daf0;touch-action:none;}

/* ── backgrounds ── */
#bg-grad{position:fixed;inset:0;z-index:0;background:linear-gradient(145deg,#fce4f5,#e8d5f0 50%,#d5e8f0);}
#bg-vid{position:fixed;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;display:none;}
#bg-img{position:fixed;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;display:none;}

/* ── render canvases — pointer-events:none, UI sits above ── */
#c3d{position:fixed;inset:0;z-index:10;width:100%;height:100%;pointer-events:none;}
#c2d{position:fixed;inset:0;z-index:11;width:100%;height:100%;pointer-events:none;}
/* touch canvas — does NOT cover UI panel at bottom (88px) or sel-bar at top (60px) */
#ctouch{position:fixed;top:64px;left:0;right:0;bottom:90px;z-index:15;pointer-events:auto;cursor:pointer;touch-action:none;}

/* ── UI z-index:500 — always on top ── */
#ui-panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:2147483647;
  display:flex;justify-content:center;align-items:center;gap:8px;
  padding:12px 12px;
  background:rgba(252,228,245,0.97);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:2px solid rgba(255,255,255,0.8);
  box-shadow:0 -4px 24px rgba(200,150,200,0.25);
}
.ubtn{
  width:52px;height:52px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.82);
  font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px var(--sh);
  cursor:pointer;
  /* large touch target */
  -webkit-user-select:none;user-select:none;
  transition:transform 0.15s,background 0.15s;
  flex-shrink:0;
  pointer-events:auto;
  position:relative;z-index:501;
}
.ubtn:active{transform:scale(0.88);background:rgba(255,200,220,0.9);}
.ubtn.on{background:linear-gradient(135deg,#ffc2d4,#d4b8e0);}
#btn-shoot{
  width:64px;height:64px;font-size:1.6rem;
  background:linear-gradient(135deg,#ffc2d4,#d4b8e0);
  box-shadow:0 4px 20px rgba(220,140,180,0.45);
}
#btn-shoot:active{transform:scale(0.84);}

/* ── top action strip (appears when char selected) ── */
#sel-bar{
  position:fixed;top:0;left:0;right:0;
  z-index:2147483647;
  display:none;
  justify-content:center;gap:10px;
  padding:10px 16px;
  pointer-events:auto;
}
#sel-bar.show{display:flex;}
.sbar-btn{
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--gb);border-radius:30px;
  padding:8px 18px;font-size:0.82rem;color:#8060a8;
  font-family:'Zen Maru Gothic',sans-serif;
  cursor:pointer;box-shadow:0 2px 10px var(--sh);
  pointer-events:auto;
  -webkit-user-select:none;user-select:none;
  position:relative;z-index:501;
}
.sbar-btn:active{transform:scale(0.93);}
.sbar-btn.del{color:#c05060;}

/* ── initial load screen ── */
#load-screen{
  position:fixed;inset:0;z-index:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:linear-gradient(145deg,rgba(252,228,245,0.96),rgba(213,232,240,0.96));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:opacity 0.5s;
}
#load-screen.hide{opacity:0;pointer-events:none;}
.load-card{
  background:rgba(255,255,255,0.6);
  border:2px dashed var(--lav);border-radius:28px;
  padding:40px 36px;text-align:center;
  box-shadow:0 8px 40px var(--sh);
  max-width:80vw;
}
.load-card .emo{font-size:3.5rem;margin-bottom:12px;}
.load-card h2{color:#8060a8;font-size:1.2rem;font-weight:500;margin-bottom:8px;}
.load-card p{color:#a888c0;font-size:0.82rem;line-height:1.8;}
.load-btn{
  margin-top:20px;
  background:linear-gradient(135deg,#ffc2d4,#d4b8e0);
  border:none;border-radius:40px;padding:14px 36px;
  font-family:'Zen Maru Gothic',sans-serif;font-size:1rem;color:white;
  cursor:pointer;box-shadow:0 4px 16px rgba(200,140,200,0.35);
  width:100%;
  pointer-events:auto;
  -webkit-user-select:none;user-select:none;
}
.load-btn:active{transform:scale(0.96);}

/* ── spinner overlay ── */
#spinner{
  position:fixed;inset:0;z-index:900;
  display:none;align-items:center;justify-content:center;
  background:rgba(252,228,245,0.75);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#spinner.show{display:flex;}
.spin{width:48px;height:48px;border:4px solid var(--lav);border-top-color:var(--pink);border-radius:50%;animation:sp 0.75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── toast ── */
#toast{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 60px);left:50%;
  transform:translateX(-50%) translateY(-10px);
  z-index:600;
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--gb);border-radius:40px;
  padding:10px 24px;font-size:0.85rem;color:#8060a8;
  opacity:0;transition:opacity 0.3s,transform 0.3s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* flash */
#flash{position:fixed;inset:0;z-index:700;background:white;opacity:0;pointer-events:none;transition:opacity 0.06s;}
#flash.on{opacity:0.9;}

/* char count badge */
#count-badge{
  position:fixed;top:calc(env(safe-area-inset-top,0px)+10px);right:14px;
  z-index:500;
  background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--gb);border-radius:20px;
  padding:5px 12px;font-size:0.75rem;color:#a080c0;
  pointer-events:none;
  display:none;
}
#count-badge.show{display:block;}
</style>
</head>
<body>

<div id="bg-grad"></div>
<video id="bg-vid" autoplay playsinline muted></video>
<img id="bg-img" alt="">

<canvas id="c3d"></canvas>
<canvas id="c2d"></canvas>
<canvas id="ctouch"></canvas>

<!-- Initial screen -->
<div id="load-screen">
  <div class="load-card">
    <div class="emo">🌸</div>
    <h2>むぃ王国へようこそ</h2>
    <p>キャラクターファイルを読み込んで<br>画面の中で暮らしてもらおう✨<br>
    <span style="font-size:0.76rem;color:#c4acd4;">.glb（3D）または透過PNG/画像<br>最大5体まで同時召喚できます</span></p>
    <button class="load-btn" id="btn-first-load">キャラを選ぶ 🌟</button>
  </div>
</div>

<!-- UI Panel (bottom) -->
<div id="ui-panel">
  <button class="ubtn" id="btn-add">➕</button>
  <button class="ubtn" id="btn-cam">📷</button>
  <button class="ubtn" id="btn-bgpic">🖼️</button>
  <button class="ubtn" id="btn-shoot">🌟</button>
  <button class="ubtn" id="btn-big">🔍</button>
  <button class="ubtn" id="btn-sml">🔎</button>
</div>

<!-- Selected char bar (top) -->
<div id="sel-bar">
  <button class="sbar-btn" id="sb-wobble">🫧 ぷるぷる</button>
  <button class="sbar-btn del" id="sb-del">✕ 削除</button>
</div>

<div id="count-badge">0 / 5</div>

<div id="spinner"><div class="spin"></div></div>
<div id="toast"></div>
<div id="flash"></div>

<!-- hidden file inputs -->
<input type="file" id="fi-char" accept=".glb,.png,.jpg,.jpeg,.webp,.gif" multiple style="display:none">
<input type="file" id="fi-bg"   accept="image/*" style="display:none">

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';

// ══════════════════════════════════════
// Renderer & scene
// ══════════════════════════════════════
const c3d = document.getElementById('c3d');
const renderer = new THREE.WebGLRenderer({canvas:c3d, alpha:true, antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0,0);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
cam.position.z = 6;
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const dl1=new THREE.DirectionalLight(0xffe0f0,1.0); dl1.position.set(2,4,3); scene.add(dl1);
const dl2=new THREE.DirectionalLight(0xd0e8ff,0.5); dl2.position.set(-2,-1,2); scene.add(dl2);

const c2d = document.getElementById('c2d');
const ctx2 = c2d.getContext('2d');
const csel = document.getElementById('ctouch');
const ctxs = csel.getContext('2d');

function resize(){
  const W=window.innerWidth, H=window.innerHeight;
  renderer.setSize(W,H);
  cam.aspect=W/H; cam.updateProjectionMatrix();
  c2d.width=W; c2d.height=H;
  csel.width=W; csel.height=H;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════
// Character class
// ══════════════════════════════════════
const SW = {walk:50,idle:20,sleep:10,flat:10,rest:10};
let uid=0;

class Char {
  constructor({type,mesh,img,bs}){
    this.id=++uid; this.type=type; this.mesh=mesh; this.img=img;
    this.bs=bs; this.sc=bs;
    this.pos={x:0.2+Math.random()*0.6, y:0.25+Math.random()*0.5};
    this.tgt={...this.pos}; this.vel={x:0,y:0};
    this.state='walk'; this.stTimer=0; this.stMax=2+Math.random()*3;
    this._newTgt();
    this.wb={on:false,t:0,sx:1,sy:1};
    this.mrot={x:0,y:0}; // manual 3D rotation
    this.flip=1; this.bob=Math.random()*Math.PI*2;
    this.ph=Math.random()*Math.PI*2;
    this._scr=null; // cached 2D screen rect
  }
  _newTgt(){const m=0.1;this.tgt={x:m+Math.random()*(1-m*2),y:m+Math.random()*(1-m*2)};}
  _pick(){
    let r=Math.random()*Object.values(SW).reduce((a,b)=>a+b,0);
    for(const[k,v]of Object.entries(SW)){r-=v;if(r<=0)return k;}return'walk';
  }
  update(dt,ts){
    this.stTimer-=dt;
    if(this.stTimer<=0){
      this.state=this._pick(); this.stMax=1.5+Math.random()*5; this.stTimer=this.stMax;
      if(this.state==='walk')this._newTgt();
    }
    if(this.state==='walk'){
      const dx=this.tgt.x-this.pos.x, dy=this.tgt.y-this.pos.y;
      const d=Math.hypot(dx,dy);
      if(d>0.01){
        this.vel.x=(dx/d)*0.055; this.vel.y=(dy/d)*0.055;
        this.pos.x+=this.vel.x*dt; this.pos.y+=this.vel.y*dt;
        this.flip=this.vel.x>=0?1:-1;
      }else{this.vel.x=0;this.vel.y=0;}
    }else{this.vel.x*=0.9;this.vel.y*=0.9;}
    this.bob+=dt*(this.state==='walk'?7:0);
    if(this.wb.on){
      this.wb.t+=dt*6;
      const e=Math.max(0,1-this.wb.t/2.5);
      const o=Math.sin(this.wb.t*Math.PI*3)*e;
      this.wb.sy=1-o*0.35; this.wb.sx=1+o*0.25;
      if(this.wb.t>2.5){this.wb.on=false;this.wb.sx=1;this.wb.sy=1;}
    }
  }
  wobble(){this.wb.on=true;this.wb.t=0;this.pos.y-=0.01;}
  // ── 3D ──
  _wxy(){
    const fov=cam.fov*Math.PI/180;
    const h=2*Math.tan(fov/2)*cam.position.z;
    return{wx:(this.pos.x-0.5)*h*cam.aspect, wy:(0.5-this.pos.y)*h};
  }
  draw3d(ts){
    if(!this.mesh)return;
    const{wx,wy}=this._wxy();
    this.mesh.position.x=wx; this.mesh.position.y=wy;
    const b=this.sc; let rx=0,ry=0,rz=0;
    if(this.state==='sleep'){rz=Math.sin(ts*.001+this.ph)*.1+Math.PI*.45;}
    else if(this.state==='flat'){this.mesh.scale.set(b*1.35*this.wb.sx,b*0.55*this.wb.sy,b*1.1);return;}
    else if(this.state==='rest'){rz=Math.sin(ts*.002+this.ph)*.08;ry=Math.sin(ts*.001+this.ph)*.12;}
    else if(this.state==='walk'){rz=Math.sin(ts*.005+this.ph)*.06;}
    this.mesh.rotation.set(rx+this.mrot.x,ry+this.mrot.y,rz);
    this.mesh.scale.set(b*this.wb.sx,b*this.wb.sy,b*this.wb.sx);
  }
  hit3d(nx,ny){
    const fov=cam.fov*Math.PI/180;
    const h=2*Math.tan(fov/2)*cam.position.z;
    const{wx,wy}=this._wxy();
    const sx=wx/(h*cam.aspect)+0.5, sy=-wy/h+0.5;
    const r=(this.sc/h)*0.65;
    return Math.abs(nx-sx)<r&&Math.abs(ny-sy)<r*1.6;
  }
  // ── 2D ──
  draw2d(ts){
    if(!this.img)return;
    const W=c2d.width,H=c2d.height;
    const bh=Math.min(W,H)*0.28*this.sc;
    const bw=bh*(this.img.width/this.img.height);
    let sx=this.wb.sx*this.flip, sy=this.wb.sy;
    const bob=this.state==='walk'?Math.sin(this.bob)*7:0;
    let ang=0;
    if(this.state==='sleep')ang=Math.PI*.5*.85;
    else if(this.state==='flat'){sy*=0.55;sx*=1.35*this.flip;}
    else if(this.state==='rest')ang=Math.sin(ts*.0015+this.ph)*.1;
    const cx=this.pos.x*W, cy=this.pos.y*H+bob;
    this._scr={cx,cy,rw:bw*.55,rh:bh*.55};
    ctx2.save();
    ctx2.translate(cx,cy);ctx2.rotate(ang);ctx2.scale(sx,sy);
    ctx2.drawImage(this.img,-bw/2,-bh/2,bw,bh);
    ctx2.restore();
  }
  hit2d(nx,ny){
    if(!this._scr)return false;
    const px=nx*csel.width, py=ny*csel.height;
    return Math.abs(px-this._scr.cx)<this._scr.rw&&Math.abs(py-this._scr.cy)<this._scr.rh;
  }
  hit(nx,ny){return this.type==='3d'?this.hit3d(nx,ny):this.hit2d(nx,ny);}
  destroy(){if(this.mesh)scene.remove(this.mesh);}
}

// ══════════════════════════════════════
// State
// ══════════════════════════════════════
const chars=[];
let sel=null;

function select(c){
  sel=c;
  document.getElementById('sel-bar').classList.toggle('show',!!c);
  updateBadge();
}
function updateBadge(){
  const b=document.getElementById('count-badge');
  if(chars.length>0){b.textContent=`${chars.length} / 5`;b.classList.add('show');}
  else b.classList.remove('show');
}
function removeChar(c){
  const i=chars.indexOf(c);if(i>=0)chars.splice(i,1);
  c.destroy();
  if(sel===c)select(null);
  updateBadge();
  if(chars.length===0)document.getElementById('load-screen').classList.remove('hide');
}

// ══════════════════════════════════════
// GLTFLoader
// ══════════════════════════════════════
let gltfOk=false;
async function loadGLTF(){
  if(gltfOk)return;
  await new Promise(r=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    s.onload=r; document.head.appendChild(s);
  });
  gltfOk=true;
}

// ══════════════════════════════════════
// File loading
// ══════════════════════════════════════
async function loadFiles(files){
  for(const f of Array.from(files)){
    if(chars.length>=5){toast('5体が上限だよ〜！');break;}
    spin(true);
    const ext=f.name.split('.').pop().toLowerCase();
    if(ext==='glb')await add3d(f); else await add2d(f);
    spin(false);
  }
  document.getElementById('load-screen').classList.add('hide');
}

async function add3d(file){
  await loadGLTF();
  const buf=await file.arrayBuffer();
  return new Promise(res=>{
    new THREE.GLTFLoader().parse(buf,'',gltf=>{
      const mesh=gltf.scene;
      const box=new THREE.Box3().setFromObject(mesh);
      const sz=new THREE.Vector3();box.getSize(sz);
      const s=1.5/Math.max(sz.x,sz.y,sz.z);
      mesh.scale.setScalar(s);
      const ctr=new THREE.Vector3();box.getCenter(ctr);
      mesh.position.sub(ctr.multiplyScalar(s));
      scene.add(mesh);
      const c=new Char({type:'3d',mesh,img:null,bs:s});
      chars.push(c);select(c);
      toast(`3Dモデル召喚！🌸 (${chars.length}/5)`);res();
    },e=>{console.error(e);toast('読み込みエラー…');res();});
  });
}

async function add2d(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=new Char({type:'2d',mesh:null,img,bs:1.0});
      chars.push(c);select(c);
      toast(`イラスト召喚！✨ (${chars.length}/5)`);res();
    };
    img.onerror=res;
    img.src=URL.createObjectURL(file);
  });
}

// ══════════════════════════════════════
// Selection ring
// ══════════════════════════════════════
function drawRing(c,ts){
  const p=0.6+0.4*Math.sin(ts*.005);
  ctxs.save();
  ctxs.strokeStyle=`rgba(255,150,200,${p})`;
  ctxs.lineWidth=3.5;ctxs.setLineDash([10,6]);
  ctxs.beginPath();
  if(c.type==='2d'&&c._scr){
    const r=Math.max(c._scr.rw,c._scr.rh)*1.1;
    ctxs.arc(c._scr.cx,c._scr.cy,r,0,Math.PI*2);
  } else if(c.type==='3d'){
    const fov=cam.fov*Math.PI/180;
    const h=2*Math.tan(fov/2)*cam.position.z;
    const{wx,wy}=c._wxy();
    const sx=(wx/(h*cam.aspect)+0.5)*csel.width;
    const sy=(-wy/h+0.5)*csel.height;
    const r=(c.sc/h)*0.72*Math.min(csel.width,csel.height);
    ctxs.arc(sx,sy,r,0,Math.PI*2);
  }
  ctxs.stroke();ctxs.restore();
}

// ══════════════════════════════════════
// Main loop
// ══════════════════════════════════════
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000,.1);last=ts;
  for(const c of chars)c.update(dt,ts);
  // 3D
  for(const c of chars)if(c.type==='3d')c.draw3d(ts);
  renderer.render(scene,cam);
  // 2D
  ctx2.clearRect(0,0,c2d.width,c2d.height);
  for(const c of chars)if(c.type==='2d')c.draw2d(ts);
  // selection overlay
  ctxs.clearRect(0,0,csel.width,csel.height);
  if(sel)drawRing(sel,ts);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════
// Touch / gesture on csel
// ══════════════════════════════════════
const g={on:false,pinch:false,lx:0,ly:0,pd0:0,sc0:1,tx:0,ty:0,moved:false};

function charAt(nx,ny){
  for(let i=chars.length-1;i>=0;i--)if(chars[i].hit(nx,ny))return chars[i];
  return null;
}
function clamp(c){
  c.pos.x=Math.max(.05,Math.min(.95,c.pos.x));
  c.pos.y=Math.max(.05,Math.min(.95,c.pos.y));
}

csel.addEventListener('touchstart',e=>{
  e.preventDefault();g.moved=false;
  if(e.touches.length===1){
    const t=e.touches[0];
    g.on=true;g.pinch=false;
    g.lx=t.clientX;g.ly=t.clientY;g.tx=t.clientX;g.ty=t.clientY;
    const nx=t.clientX/window.innerWidth,ny=t.clientY/window.innerHeight;
    const hit=charAt(nx,ny);
    select(hit||null);
  } else if(e.touches.length===2){
    g.on=false;g.pinch=true;
    g.pd0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    g.sc0=sel?sel.sc:1;
    g.lx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    g.ly=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
},{passive:false});

csel.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&g.on){
    const t=e.touches[0];
    const dx=t.clientX-g.lx,dy=t.clientY-g.ly;
    if(Math.abs(dx)+Math.abs(dy)>4)g.moved=true;
    if(sel){
      if(sel.type==='3d'){
        sel.mrot.y+=dx*.009;sel.mrot.x+=dy*.009;
        sel.mrot.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,sel.mrot.x));
      } else {
        sel.pos.x+=dx/window.innerWidth;sel.pos.y+=dy/window.innerHeight;
        clamp(sel);if(dx!==0)sel.flip=dx>0?1:-1;
      }
    }
    g.lx=t.clientX;g.ly=t.clientY;
  } else if(e.touches.length===2&&g.pinch){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(sel)sel.sc=Math.max(.1,Math.min(8,g.sc0*(d/g.pd0)));
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    if(sel){sel.pos.x+=(mx-g.lx)/window.innerWidth;sel.pos.y+=(my-g.ly)/window.innerHeight;clamp(sel);}
    g.lx=mx;g.ly=my;g.moved=true;
  }
},{passive:false});

csel.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length===0){
    g.on=false;g.pinch=false;
    if(!g.moved&&sel){
      if(sel.hit(g.tx/window.innerWidth,g.ty/window.innerHeight))sel.wobble();
    }
  } else if(e.touches.length===1){
    g.pinch=false;g.on=true;
    g.lx=e.touches[0].clientX;g.ly=e.touches[0].clientY;
  }
},{passive:false});

// ── prevent default scroll/zoom on document ──
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ══════════════════════════════════════
// Camera AR
// ══════════════════════════════════════
let camStream=null,camOn=false;
async function toggleCam(){
  const btn=document.getElementById('btn-cam');
  if(camOn){
    camStream?.getTracks().forEach(t=>t.stop());camStream=null;
    document.getElementById('bg-vid').style.display='none';
    document.getElementById('bg-vid').srcObject=null;
    document.getElementById('bg-grad').style.display='block';
    camOn=false;btn.classList.remove('on');toast('カメラOFF');
  } else {
    try{
      // mediaDevices may be undefined on some browsers even with https
      const md = navigator.mediaDevices || {};
      const gum = (md.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia);
      if(!gum){ toast('カメラAPIが見つかりません'); return; }
      let stream;
      try{
        stream=await md.getUserMedia.call(md,{video:{facingMode:{ideal:'environment'}}});
      }catch(e1){
        console.warn('背面カメラ失敗',e1.name);
        try{ stream=await md.getUserMedia.call(md,{video:true}); }
        catch(e2){ throw e2; }
      }
      camStream=stream;
      const v=document.getElementById('bg-vid');
      v.srcObject=camStream;v.style.display='block';
      document.getElementById('bg-grad').style.display='none';
      document.getElementById('bg-img').style.display='none';
      camOn=true;btn.classList.add('on');toast('📷 ARモードON！');
    }catch(err){
      console.error('camera error:',err.name,err.message);
      if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){
        toast('権限が拒否されています → アドレスバー左の🔒から許可を');
      }else if(err.name==='NotFoundError'){
        toast('カメラが見つかりません');
      }else if(err.name==='NotReadableError'){
        toast('カメラが他のアプリで使用中です');
      }else{
        toast('カメラエラー: '+err.name);
      }
    }
  }
}

// ══════════════════════════════════════
// Screenshot
// ══════════════════════════════════════
async function shoot(){
  const fl=document.getElementById('flash');
  fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),180);
  const W=window.innerWidth,H=window.innerHeight;
  const out=document.createElement('canvas');out.width=W;out.height=H;
  const oc=out.getContext('2d');
  const vid=document.getElementById('bg-vid');
  const bgi=document.getElementById('bg-img');
  if(camOn&&vid.readyState>=2)oc.drawImage(vid,0,0,W,H);
  else if(bgi.style.display!=='none')oc.drawImage(bgi,0,0,W,H);
  else{
    const gr=oc.createLinearGradient(0,0,W,H);
    gr.addColorStop(0,'#fce4f5');gr.addColorStop(.4,'#e8d5f0');gr.addColorStop(1,'#d5e8f0');
    oc.fillStyle=gr;oc.fillRect(0,0,W,H);
  }
  renderer.render(scene,cam);
  oc.drawImage(c3d,0,0,W,H);
  oc.drawImage(c2d,0,0,W,H);
  const a=document.createElement('a');
  a.download=`mui-${Date.now()}.png`;a.href=out.toDataURL('image/png');a.click();
  toast('保存しました 🌟');
}

// ══════════════════════════════════════
// Helpers
// ══════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
function spin(b){document.getElementById('spinner').classList.toggle('show',b);}

// ══════════════════════════════════════
// Button bindings — all use addEventListener
// ══════════════════════════════════════
function onBtn(id,fn){
  document.getElementById(id).addEventListener('click',e=>{e.stopPropagation();fn();});
}

onBtn('btn-first-load',()=>document.getElementById('fi-char').click());
onBtn('btn-add',()=>{
  if(chars.length>=5){toast('5体が上限だよ〜！');return;}
  document.getElementById('fi-char').click();
});
onBtn('btn-cam',toggleCam);
onBtn('btn-bgpic',()=>{
  if(camOn){
    camStream?.getTracks().forEach(t=>t.stop());camStream=null;
    document.getElementById('bg-vid').style.display='none';
    document.getElementById('bg-vid').srcObject=null;
    camOn=false;document.getElementById('btn-cam').classList.remove('on');
  }
  document.getElementById('fi-bg').click();
});
onBtn('btn-shoot',shoot);
onBtn('btn-big',()=>{
  if(sel){sel.sc=Math.min(8,sel.sc*1.22);toast('拡大 🔍');}
  else toast('キャラをタップして選んでね');
});
onBtn('btn-sml',()=>{
  if(sel){sel.sc=Math.max(.1,sel.sc*.82);toast('縮小 🔎');}
  else toast('キャラをタップして選んでね');
});
onBtn('sb-wobble',()=>{if(sel)sel.wobble();});
onBtn('sb-del',()=>{if(sel)removeChar(sel);});

document.getElementById('fi-char').addEventListener('change',e=>{
  if(e.target.files.length)loadFiles(e.target.files);
  e.target.value='';
});
document.getElementById('fi-bg').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const bi=document.getElementById('bg-img');
  bi.src=URL.createObjectURL(f);bi.style.display='block';
  document.getElementById('bg-grad').style.display='none';
  toast('背景を設定しました 🖼️');
  e.target.value='';
});

// drag&drop for desktop compatibility
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{
  e.preventDefault();
  if(e.dataTransfer.files.length)loadFiles(e.dataTransfer.files);
});
